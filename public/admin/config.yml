# 本機編輯用（不用架設 OAuth）：
#   1. npm run dev       （另開一個終端機視窗）
#   2. npm run cms
#   3. 瀏覽器打開 http://localhost:4321/admin/
#
# 之後如果想從任何地方（不只是自己的電腦）編輯，需要另外設定 GitHub OAuth
# proxy，把下面 local_backend 拿掉、backend 改用真的 GitHub 帳號登入即可，
# 詳見 README。

backend:
  name: github
  repo: hyyunn00/hyyunn00.github.io
  branch: main

local_backend: true

publish_mode: simple
media_folder: public/images/uploads
public_folder: /images/uploads

i18n:
  structure: multiple_folders
  locales: [zh, en]
  default_locale: zh

collections:
  - name: work
    label: 作品 Work
    label_singular: 作品項目
    folder: src/content/work
    create: true
    delete: true
    extension: md
    format: frontmatter
    i18n: true
    identifier_field: title
    slug: '{{fields.entrySlug}}'
    fields:
      - label: 檔名 Slug（英文小寫＋連字號，例如 my-photo-title，中英文版本要一致，建立後請勿修改）
        name: entrySlug
        widget: string
        pattern: ['^[a-z0-9]+(-[a-z0-9]+)*$', '請用小寫英文字母、數字、連字號']
        i18n: duplicate
      - { label: 標題 Title, name: title, widget: string, i18n: true }
      - { label: 編號 Frame No.（例如 "10"，兩個語言版本要一樣）, name: frameNo, widget: string, i18n: duplicate }
      - label: 日期 Date
        name: date
        widget: datetime
        format: 'YYYY-MM-DD'
        date_format: 'YYYY-MM-DD'
        time_format: false
        i18n: duplicate
      - { label: 地點 Location, name: location, widget: string, required: false, i18n: true }
      - { label: 拍攝資訊 Settings（例如 f/2.8 · 35mm）, name: settings, widget: string, required: false, i18n: true }
      - label: 列表頁佔位色塊 Cover Swatch（還沒放真實照片時顯示的顏色）
        name: cover
        widget: select
        options: [a, b, c, d, e, f]
        default: a
        i18n: duplicate
      - label: 封面照片 Cover Image（選填，有上傳的話列表頁和首頁會直接顯示這張，不用佔位色塊。只會用在列表縮圖跟首頁，作品內頁不會再顯示一次）
        name: coverImage
        widget: image
        required: false
        i18n: duplicate
      - label: >-
          首頁大圖精選 Featured on homepage（勾選這篇會變成首頁標題旁的大圖。如果同時勾選好幾篇，取最新一篇；
          都不勾的話會自動顯示最新的作品）
        name: featured
        widget: boolean
        default: false
        required: false
        i18n: duplicate
      - label: >-
          顯示在首頁「近期作品」Show in homepage grid（勾選後會出現在首頁下方的作品格，最多顯示 4 篇，
          超過的話取最新的 4 篇；都不勾的話會自動顯示最新的幾篇，不會跟上面的大圖精選重複）
        name: showOnHome
        widget: boolean
        default: false
        required: false
        i18n: duplicate
      - label: >-
          內容區塊 Blocks（依照順序排列，可以新增／刪除／拖曳調整順序。中英文的區塊是分開的：建議先把一個語言的照片都放好，
          再點上面「Fill in from another locale」整個複製過去，另一邊只要改文字，照片不用重新上傳）
        name: blocks
        widget: list
        i18n: true
        types:
          - label: 文字 Text
            name: text
            widget: object
            fields:
              - { label: 內容, name: body, widget: markdown }
          - label: 單張照片 Photo
            name: photo
            widget: object
            fields:
              - { label: 照片, name: src, widget: image }
              - { label: 替代文字 Alt（給無障礙閱讀器用，簡短描述照片內容）, name: alt, widget: string }
              - { label: 說明文字 Caption, name: caption, widget: string, required: false }
          - label: 多張照片／拼貼 Gallery
            name: gallery
            widget: object
            fields:
              - label: 照片們（至少 2 張）
                name: images
                widget: list
                fields:
                  - { label: 照片, name: src, widget: image }
                  - { label: 替代文字 Alt, name: alt, widget: string }
              - { label: 說明文字 Caption, name: caption, widget: string, required: false }
          - label: 嵌入內容 Embed（YouTube／Vimeo 等，貼「嵌入用」網址，不是一般分享連結）
            name: embed
            widget: object
            fields:
              - {
                  label: '嵌入網址 URL（貼網址本身，或直接貼整段 <iframe> 程式碼都可以，系統會自動抓出網址）',
                  name: url,
                  widget: string,
                }
              - { label: 長寬比 Aspect ratio, name: aspect, widget: string, default: '16/9' }
              - { label: 說明文字 Caption, name: caption, widget: string, required: false }
      - { label: 草稿（勾選後不會顯示在網站上）Draft, name: draft, widget: boolean, default: false, required: false, i18n: duplicate }

  - name: journal
    label: 文章 Journal
    label_singular: 文章
    folder: src/content/journal
    create: true
    delete: true
    extension: md
    format: frontmatter
    i18n: true
    identifier_field: title
    slug: '{{fields.entrySlug}}'
    fields:
      - label: 檔名 Slug（英文小寫＋連字號，中英文版本要一致，建立後請勿修改）
        name: entrySlug
        widget: string
        pattern: ['^[a-z0-9]+(-[a-z0-9]+)*$', '請用小寫英文字母、數字、連字號']
        i18n: duplicate
      - { label: 標題 Title, name: title, widget: string, i18n: true }
      - label: 日期 Date
        name: date
        widget: datetime
        format: 'YYYY-MM-DD'
        date_format: 'YYYY-MM-DD'
        time_format: false
        i18n: duplicate
      - { label: 摘要 Excerpt（顯示在列表頁的一兩句話）, name: excerpt, widget: text, i18n: true }
      - { label: 草稿（勾選後不會顯示在網站上）Draft, name: draft, widget: boolean, default: false, required: false, i18n: duplicate }
      - { label: 內文 Body, name: body, widget: markdown, i18n: true }

  - name: about
    label: 關於頁資料 About Info
    label_singular: 關於頁資料
    folder: src/content/about
    create: false
    delete: false
    extension: md
    format: frontmatter
    i18n: true
    identifier_field: title
    fields:
      - { label: 標題（僅供後台顯示，不會出現在網站上）, name: title, widget: hidden, default: 關於頁資料 }
      - label: 展覽 Exhibitions
        name: exhibitions
        widget: list
        i18n: true
        summary: '{{fields.year}} — {{fields.title}}'
        fields:
          - { label: 年份 Year（例如 2025，或 2021—2025）, name: year, widget: string }
          - { label: 展覽名稱 Title, name: title, widget: string }
          - { label: 地點／備註 Venue（選填，例如「範例藝廊・臺北（群展）」）, name: venue, widget: string, required: false }
      - label: 學經歷 Education & Experience
        name: experience
        widget: list
        i18n: true
        summary: '{{fields.year}} — {{fields.title}}'
        fields:
          - { label: 年份 Year（例如 2021—2025，或 2025—）, name: year, widget: string }
          - { label: 名稱 Title（學校科系或公司職稱）, name: title, widget: string }
          - { label: 備註 Venue（選填，例如「學士」「攝影師（兼職）」）, name: venue, widget: string, required: false }
